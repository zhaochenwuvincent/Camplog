<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Camp Log</title>
<meta name="description" content="A pocket logbook for camping trips.">
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Camp Log">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<meta name="theme-color" content="#D9DCD6">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>

:root{
  --page:#D9DCD6; --cream:#F1ECE0; --kraft:#D9C4A1;
  --ink:#23211C; --ink-soft:#6F6757;
  --olive:#6E7245; --olive-d:#585B36; --sage:#C4CBC2;
  --wood:#7E5A43; --wood-d:#5C3F2C;
  --coral:#C0734A; --coral-d:#A85E38; --yellow:#E7D656; --gray:#C9C8C1;
  --line:#CDBE9C; --done:#9AA08C;
  --radius:14px; --pad:18px;
  --disp:"Archivo","Arial Narrow",system-ui,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:var(--mono);background:var(--page);color:var(--ink);min-height:100%;line-height:1.45;overscroll-behavior-y:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea{font:inherit;color:inherit}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

/* ---------- header ---------- */
header{
  position:relative; overflow:hidden;
  padding:calc(env(safe-area-inset-top) + 42px) var(--pad) 28px;
  background:linear-gradient(90deg,var(--sage) 0 46%, var(--olive) 46% 100%);
}
header .blob{position:absolute;left:-18px;top:12px;width:392px;height:208px;z-index:0;pointer-events:none}
header .mk{position:absolute;z-index:1;pointer-events:none}
header .mk-a{width:30px;height:30px;background:var(--ink);right:56px;top:30px}
header .mk-b{width:30px;height:30px;background:var(--ink);right:26px;top:60px}
header .mk-dot{width:15px;height:15px;border-radius:50%;background:var(--ink);right:42px;top:102px}
header h1{
  position:relative;z-index:2;display:inline-block;white-space:nowrap;
  font-family:var(--disp);font-weight:900;text-transform:uppercase;
  letter-spacing:-.035em;line-height:.9;
  font-size:clamp(1.9rem,8vw,2.8rem);color:var(--gray);
}
header h1 .flag{display:none}
.statline{position:relative;z-index:2;margin-top:12px;font-family:var(--mono);font-size:.74rem;letter-spacing:.03em;color:var(--ink)}
.statline b{font-weight:700;color:var(--coral-d)}

/* ---------- layout / tabs ---------- */
main{padding:calc(var(--pad) + 4px) var(--pad) calc(env(safe-area-inset-bottom) + 110px);max-width:640px;margin:0 auto}
.view{display:none}
.view.active{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion: reduce){.view.active{animation:none}*{transition:none !important}}
nav.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:30;
  display:flex;justify-content:space-around;
  background:var(--cream);border-top:2px solid var(--ink);
  padding:10px 8px calc(env(safe-area-inset-bottom) + 12px);
}
nav.tabbar button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;
  font-family:var(--mono);font-size:.62rem;font-weight:600;letter-spacing:.09em;text-transform:uppercase;
  color:var(--ink-soft);padding:4px 0;
}
nav.tabbar button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
nav.tabbar button.active{color:var(--coral)}
nav.tabbar button.active svg{fill:currentColor}
nav.tabbar button:focus-visible{outline:2px solid var(--coral);outline-offset:2px;border-radius:8px}

/* ---------- section heads ---------- */
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin:6px 0 22px}
.section-head h2{font-family:var(--disp);font-weight:900;text-transform:uppercase;letter-spacing:-.015em;line-height:.92;font-size:1.7rem;color:var(--coral)}
.section-head .tool{font-family:var(--mono);font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft)}
.section-head .tool:focus-visible{outline:2px solid var(--coral);outline-offset:2px}

/* ---------- tag filter ---------- */
.tagrow{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:8px;scrollbar-width:none}
.tagrow::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;font-family:var(--mono);font-size:.72rem;font-weight:600;letter-spacing:.02em;
  padding:5px 11px;border-radius:0;border:1.5px solid var(--line);background:var(--cream);color:var(--ink-soft);
}
.chip.on{background:var(--wood);border-color:var(--wood);color:var(--cream)}
.chip:focus-visible{outline:2px solid var(--coral);outline-offset:2px}

/* ---------- trail timeline ---------- */
.trail{position:relative;padding-left:30px}
.trail::before{content:"";position:absolute;left:11px;top:8px;bottom:8px;width:2px;
  background:repeating-linear-gradient(var(--line) 0 6px, transparent 6px 12px)}
.stop{position:relative;margin-bottom:16px}
.stop .blaze{position:absolute;left:-25px;top:18px;width:14px;height:14px;background:var(--coral);box-shadow:0 0 0 4px var(--page)}
.stop.upcoming .blaze{background:var(--cream);border:2px solid var(--olive)}
.stop.now .blaze{background:var(--olive)}
.card{
  background:var(--cream);border:none;border-radius:var(--radius);
  padding:14px 15px;text-align:left;width:100%;display:block;
  box-shadow:0 8px 20px rgba(34,30,24,.10),0 1px 3px rgba(34,30,24,.08);
}
.card:focus-visible{outline:2px solid var(--coral);outline-offset:2px}
.card .dates{font-family:var(--mono);font-size:.7rem;color:var(--ink-soft);letter-spacing:.06em;text-transform:uppercase}
.card .dates .nights{color:var(--coral);font-weight:700}
.stop.upcoming .card .dates .nights{color:var(--olive)}
.card h3{font-family:var(--disp);font-weight:800;font-size:1.18rem;letter-spacing:-.01em;margin:3px 0 2px;color:var(--ink)}
.card .place{font-family:var(--mono);font-size:.78rem;color:var(--ink-soft)}
.card .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.card .tags span{font-family:var(--mono);font-size:.66rem;font-weight:600;letter-spacing:.02em;padding:2px 8px;background:var(--kraft);color:var(--wood-d)}
.stop.upcoming .card .tags span{background:var(--sage);color:var(--olive-d)}
.card .notes{font-family:var(--mono);font-size:.78rem;line-height:1.5;color:var(--ink-soft);margin-top:9px;white-space:pre-wrap}

.here{position:relative;display:flex;align-items:center;gap:10px;margin:22px 0 22px -30px;padding-left:4px}
.here .pin{width:16px;height:16px;flex:0 0 auto;background:var(--coral);
  clip-path:polygon(50% 100%, 0 18%, 100% 18%);box-shadow:0 0 0 4px var(--page);margin-left:3px}
.here span{font-family:var(--mono);font-size:.66rem;font-weight:700;letter-spacing:.18em;color:var(--coral)}
.here::after{content:"";flex:1;border-top:2px solid var(--coral);opacity:.4}

.empty{text-align:center;color:var(--ink-soft);font-family:var(--mono);font-size:.82rem;line-height:1.55;
  padding:42px 22px;border:2px dashed var(--line);border-radius:var(--radius)}
.empty b{display:block;font-family:var(--disp);font-weight:800;text-transform:uppercase;font-size:1.2rem;color:var(--coral);margin-bottom:6px}

/* ---------- FAB (starburst seal) ---------- */
.fab{
  position:fixed;right:16px;bottom:calc(env(safe-area-inset-bottom) + 86px);z-index:25;
  width:72px;height:72px;display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 6px 14px rgba(34,30,24,.32));
}
.fab .seal{position:absolute;inset:0;width:100%;height:100%}
.fab .seal polygon{fill:var(--ink)}
.fab .plus{position:relative;z-index:1;font-family:var(--disp);font-weight:800;font-size:1.7rem;line-height:1;color:var(--cream);transform:translateY(-1px)}
.fab:focus-visible{outline:none}
.fab:focus-visible .seal polygon{stroke:var(--coral);stroke-width:4}

/* ---------- lists (checklist / todo) ---------- */
ul.items{list-style:none;display:flex;flex-direction:column;gap:10px}
ul.items li{
  display:flex;align-items:center;gap:12px;
  background:var(--cream);border:none;border-radius:12px;padding:12px 13px;
  box-shadow:0 6px 16px rgba(34,30,24,.08);
}
.tick{width:26px;height:26px;flex:0 0 auto;border-radius:7px;border:2.4px solid var(--line);background:transparent;
  display:flex;align-items:center;justify-content:center}
.tick svg{width:14px;height:14px;stroke:var(--cream);stroke-width:3.2;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0}
li.done .tick{background:var(--coral);border-color:var(--coral)}
li.done .tick svg{opacity:1}
li .txt{flex:1;font-family:var(--mono);font-size:.85rem;font-weight:600;letter-spacing:.02em;text-transform:uppercase;word-break:break-word;color:var(--ink)}
li.done .txt{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:var(--coral);text-decoration-thickness:2px}
li .del{font-family:var(--mono);color:var(--ink-soft);font-size:1.05rem;padding:4px 6px;opacity:.6}
.tick:focus-visible,li .del:focus-visible{outline:2px solid var(--coral);outline-offset:2px}
.addrow{display:flex;gap:8px;margin-bottom:16px}
.addrow input{flex:1;padding:12px 13px;border-radius:12px;border:1.5px solid var(--line);background:var(--cream);font-family:var(--mono);font-size:.86rem}
.addrow input:focus{outline:2px solid var(--olive);outline-offset:1px}
.addrow button{padding:0 16px;border-radius:12px;background:var(--ink);color:var(--cream);font-family:var(--disp);font-weight:800;font-size:.8rem;letter-spacing:.04em;text-transform:uppercase}
.addrow button:focus-visible{outline:2px solid var(--coral);outline-offset:2px}

/* ---------- sheet (add/edit trip) ---------- */
.sheet-backdrop{position:fixed;inset:0;background:rgba(34,30,24,.5);z-index:40;display:none}
.sheet-backdrop.open{display:block}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:41;
  background:var(--cream);border-radius:22px 22px 0 0;
  padding:20px var(--pad) calc(env(safe-area-inset-bottom) + 20px);
  max-height:88vh;overflow-y:auto;
  transform:translateY(105%);transition:transform .26s cubic-bezier(.2,.85,.25,1);
  max-width:640px;margin:0 auto;box-shadow:0 -16px 40px rgba(34,30,24,.3);
}
.sheet.open{transform:none}
.sheet h2{font-family:var(--disp);font-weight:900;text-transform:uppercase;letter-spacing:-.01em;font-size:1.6rem;color:var(--coral);margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-family:var(--mono);font-size:.66rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
.field input,.field textarea{width:100%;padding:11px 13px;border-radius:12px;border:1.5px solid var(--line);background:var(--page);font-family:var(--mono);font-size:.9rem}
.field input:focus,.field textarea:focus{outline:2px solid var(--olive);outline-offset:1px}
.field textarea{min-height:74px;resize:vertical}
.daterow{display:flex;gap:10px}
.daterow .field{flex:1}
.tagsugg{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.sheet-actions{display:flex;gap:10px;margin-top:8px}
.btn{flex:1;padding:14px;border-radius:13px;font-family:var(--disp);font-weight:800;font-size:.95rem;letter-spacing:.03em;text-transform:uppercase;text-align:center}
.btn.primary{background:var(--coral);color:#F6EFE2}
.btn.ghost{background:transparent;border:2px solid var(--ink);color:var(--ink)}
.btn.danger{background:none;color:var(--coral-d);font-family:var(--mono);font-weight:700;text-transform:uppercase;font-size:.76rem;letter-spacing:.06em;margin-top:12px;width:100%}
.btn:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

/* ---------- footer tools + toast ---------- */
.datatools{margin-top:28px;display:flex;justify-content:center;gap:20px;font-family:var(--mono);font-size:.72rem;color:var(--ink-soft)}
.datatools button{font-weight:600;text-decoration:underline;text-underline-offset:3px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em}
.toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);
  bottom:calc(env(safe-area-inset-bottom) + 150px);z-index:60;
  background:var(--ink);color:var(--cream);padding:10px 18px;border-radius:999px;
  font-family:var(--mono);font-size:.76rem;font-weight:600;
  opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

</style>
</head>
<body>

<header>
  <svg class="blob" viewBox="0 0 240 196" aria-hidden="true"><path fill="#23211C" d="M58 14 C92 -2 120 6 138 12 C150 4 170 2 178 18 C196 16 210 30 206 50 C224 60 232 84 218 102 C228 122 214 146 192 148 C184 168 158 174 140 164 C120 178 92 176 78 160 C52 168 26 154 26 130 C6 122 -2 96 14 78 C2 56 18 30 42 30 C44 18 50 16 58 14 Z"/></svg>
  <span class="mk mk-a" aria-hidden="true"></span>
  <span class="mk mk-b" aria-hidden="true"></span>
  <span class="mk mk-dot" aria-hidden="true"></span>
  <h1><span class="flag" aria-hidden="true"></span>Camp Log</h1>
  <p class="statline mono" id="statline"></p>
</header>

<main>
  <!-- TRIPS -->
  <section class="view active" id="view-trips" aria-label="Trips">
    <div class="tagrow" id="tagrow"></div>
    <div id="timeline"></div>
    <div class="datatools">
      <button id="btn-export">Export backup</button>
      <button id="btn-import">Import backup</button>
      <input type="file" id="import-file" accept="application/json,.json" hidden>
    </div>
  </section>

  <!-- CHECKLIST -->
  <section class="view" id="view-checklist" aria-label="Packing checklist">
    <div class="section-head">
      <h2>Packing</h2>
      <button class="tool" id="btn-reset-checks">Uncheck all</button>
    </div>
    <div class="addrow">
      <input id="check-input" type="text" placeholder="Add gear…" enterkeyhint="done" aria-label="New checklist item">
      <button id="check-add">Add</button>
    </div>
    <ul class="items" id="checklist"></ul>
  </section>

  <!-- TODO -->
  <section class="view" id="view-todo" aria-label="To-do list">
    <div class="section-head">
      <h2>To-do</h2>
      <button class="tool" id="btn-clear-done">Clear done</button>
    </div>
    <div class="addrow">
      <input id="todo-input" type="text" placeholder="Add a task…" enterkeyhint="done" aria-label="New task">
      <button id="todo-add">Add</button>
    </div>
    <ul class="items" id="todolist"></ul>
  </section>
</main>

<button class="fab" id="fab" aria-label="Add trip"><svg class="seal" viewBox="0 0 100 100" aria-hidden="true"><polygon points="50,2 59.83,13.3 74,8.43 76.9,23.1 91.57,26 86.7,40.17 98,50 86.7,59.83 91.57,74 76.9,76.9 74,91.57 59.83,86.7 50,98 40.17,86.7 26,91.57 23.1,76.9 8.43,74 13.3,59.83 2,50 13.3,40.17 8.43,26 23.1,23.1 26,8.43 40.17,13.3"/></svg><span class="plus" aria-hidden="true">+</span></button>

<nav class="tabbar" aria-label="Sections">
  <button data-view="trips" class="active">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 L21 20 L3 20 Z"/></svg>
    Trips
  </button>
  <button data-view="checklist">
    <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="16" height="16"/></svg>
    Checklist
  </button>
  <button data-view="todo">
    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/></svg>
    To-do
  </button>
</nav>

<!-- add / edit trip sheet -->
<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
  <h2 id="sheet-title">New trip</h2>
  <div class="field">
    <label for="f-title">Trip name</label>
    <input id="f-title" type="text" placeholder="e.g. Lakeside long weekend">
  </div>
  <div class="field">
    <label for="f-place">Place</label>
    <input id="f-place" type="text" placeholder="e.g. Lake Sagami">
  </div>
  <div class="daterow">
    <div class="field">
      <label for="f-start">Start</label>
      <input id="f-start" type="date">
    </div>
    <div class="field">
      <label for="f-end">End</label>
      <input id="f-end" type="date">
    </div>
  </div>
  <div class="field">
    <label for="f-tags">Tags <span style="text-transform:none;font-weight:400">(comma separated)</span></label>
    <input id="f-tags" type="text" placeholder="lake, with family, autumn">
    <div class="tagsugg" id="tagsugg"></div>
  </div>
  <div class="field">
    <label for="f-notes">Notes</label>
    <textarea id="f-notes" placeholder="Campsite number, weather, what to remember next time…"></textarea>
  </div>
  <div class="sheet-actions">
    <button class="btn ghost" id="btn-cancel">Cancel</button>
    <button class="btn primary" id="btn-save">Save trip</button>
  </div>
  <button class="btn danger" id="btn-delete" hidden>Delete this trip</button>
</div>

<div class="toast" id="toast" role="status"></div>

<script>
"use strict";
const KEY = "camplog.v1";
const $ = (s) => document.querySelector(s);

/* ---------- state ---------- */
const DEFAULT_CHECKLIST = ["Tent + stakes","Sleeping bags","Sleeping pads","Stove + fuel","Lighter / matches","Cookware + utensils","Water","Headlamps","First aid kit","Trash bags","Power bank","Rain layer"];
let state = load();
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {
    trips: [],
    checklist: DEFAULT_CHECKLIST.map(t => ({id:uid(), text:t, done:false})),
    todos: []
  };
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/* ---------- helpers ---------- */
function todayStr(){
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function fmtRange(start, end){
  const f = (s, withYear) => {
    const d = new Date(s + "T00:00");
    const opts = {month:"short", day:"numeric"};
    if(withYear) opts.year = "2-digit";
    return new Intl.DateTimeFormat("en", opts).format(d);
  };
  if(!end || end === start) return f(start, true);
  const sameMonth = start.slice(0,7) === end.slice(0,7);
  if(sameMonth){
    return f(start, false) + "–" + new Date(end+"T00:00").getDate() + " ’" + start.slice(2,4);
  }
  return f(start, false) + " – " + f(end, true);
}
function nights(start, end){
  if(!end) return 0;
  return Math.max(0, Math.round((new Date(end+"T00:00") - new Date(start+"T00:00")) / 86400000));
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function toast(msg){
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._h);
  t._h = setTimeout(()=> t.classList.remove("show"), 1800);
}

/* ---------- tabs ---------- */
document.querySelectorAll("nav.tabbar button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("nav.tabbar button").forEach(b => b.classList.toggle("active", b === btn));
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    $("#view-" + btn.dataset.view).classList.add("active");
    $("#fab").style.display = btn.dataset.view === "trips" ? "flex" : "none";
    window.scrollTo({top:0});
  });
});

/* ---------- trips ---------- */
let activeTag = null;

function allTags(){
  const set = new Set();
  state.trips.forEach(t => (t.tags||[]).forEach(g => set.add(g)));
  return [...set].sort((a,b)=> a.localeCompare(b));
}

function renderTagRow(){
  const tags = allTags();
  const row = $("#tagrow");
  if(!tags.length){ row.innerHTML = ""; return; }
  row.innerHTML = `<button class="chip ${activeTag===null?"on":""}" data-tag="">All</button>` +
    tags.map(g => `<button class="chip ${activeTag===g?"on":""}" data-tag="${escapeHtml(g)}">${escapeHtml(g)}</button>`).join("");
  row.querySelectorAll(".chip").forEach(c => c.addEventListener("click", () => {
    activeTag = c.dataset.tag || null;
    renderTrips();
  }));
}

function tripCard(t, cls){
  const n = nights(t.start, t.end);
  return `<div class="stop ${cls}">
    <span class="blaze" aria-hidden="true"></span>
    <button class="card" data-id="${t.id}" aria-label="Edit trip ${escapeHtml(t.title)}">
      <div class="dates mono">${fmtRange(t.start, t.end)}${n ? ` · <span class="nights">${n} night${n>1?"s":""}</span>` : ""}</div>
      <h3>${escapeHtml(t.title)}</h3>
      ${t.place ? `<div class="place">${escapeHtml(t.place)}</div>` : ""}
      ${(t.tags && t.tags.length) ? `<div class="tags">${t.tags.map(g=>`<span>${escapeHtml(g)}</span>`).join("")}</div>` : ""}
      ${t.notes ? `<div class="notes">${escapeHtml(t.notes)}</div>` : ""}
    </button>
  </div>`;
}

function renderTrips(){
  renderTagRow();
  const tl = $("#timeline");
  const today = todayStr();
  let trips = [...state.trips];
  if(activeTag) trips = trips.filter(t => (t.tags||[]).includes(activeTag));

  if(!trips.length){
    tl.innerHTML = `<div class="empty"><b>${state.trips.length ? "No trips with this tag" : "No trips yet"}</b>${state.trips.length ? "Pick another tag, or All." : "Tap + to log your first one — past or planned."}</div>`;
    renderStats();
    return;
  }

  const upcoming = trips.filter(t => t.start > today).sort((a,b)=> b.start.localeCompare(a.start));
  const current  = trips.filter(t => t.start <= today && (t.end || t.start) >= today).sort((a,b)=> b.start.localeCompare(a.start));
  const past     = trips.filter(t => (t.end || t.start) < today).sort((a,b)=> b.start.localeCompare(a.start));

  let html = `<div class="trail">`;
  html += upcoming.map(t => tripCard(t, "upcoming")).join("");
  html += `<div class="here"><span class="pin" aria-hidden="true"></span><span>YOU ARE HERE</span></div>`;
  html += current.map(t => tripCard(t, "now")).join("");
  html += past.map(t => tripCard(t, "past")).join("");
  html += `</div>`;
  tl.innerHTML = html;

  tl.querySelectorAll(".card").forEach(c => c.addEventListener("click", () => openSheet(c.dataset.id)));
  renderStats();
}

function renderStats(){
  const today = todayStr();
  const past = state.trips.filter(t => (t.end || t.start) <= today);
  const up = state.trips.filter(t => t.start > today).length;
  const totalNights = past.reduce((s,t)=> s + nights(t.start, t.end), 0);
  const places = new Set(state.trips.map(t => t.place).filter(Boolean)).size;
  $("#statline").innerHTML = `<b>${past.length}</b> trips · <b>${totalNights}</b> nights out · <b>${places}</b> places · <b>${up}</b> upcoming`;
}

/* ---------- trip sheet ---------- */
let editingId = null;

function openSheet(id){
  editingId = id || null;
  const t = id ? state.trips.find(x => x.id === id) : null;
  $("#sheet-title").textContent = t ? "Edit trip" : "New trip";
  $("#f-title").value = t ? t.title : "";
  $("#f-place").value = t ? (t.place || "") : "";
  $("#f-start").value = t ? t.start : todayStr();
  $("#f-end").value = t ? (t.end || "") : "";
  $("#f-tags").value = t ? (t.tags || []).join(", ") : "";
  $("#f-notes").value = t ? (t.notes || "") : "";
  $("#btn-delete").hidden = !t;
  renderTagSuggestions();
  $("#backdrop").classList.add("open");
  $("#sheet").classList.add("open");
}
function closeSheet(){
  $("#backdrop").classList.remove("open");
  $("#sheet").classList.remove("open");
  editingId = null;
}
function renderTagSuggestions(){
  const box = $("#tagsugg");
  const tags = allTags();
  box.innerHTML = tags.map(g => `<button class="chip" type="button" data-g="${escapeHtml(g)}">${escapeHtml(g)}</button>`).join("");
  box.querySelectorAll("button").forEach(b => b.addEventListener("click", () => {
    const inp = $("#f-tags");
    const cur = inp.value.split(",").map(s=>s.trim()).filter(Boolean);
    if(!cur.includes(b.dataset.g)) cur.push(b.dataset.g);
    inp.value = cur.join(", ");
  }));
}

$("#fab").addEventListener("click", () => openSheet(null));
$("#backdrop").addEventListener("click", closeSheet);
$("#btn-cancel").addEventListener("click", closeSheet);

$("#btn-save").addEventListener("click", () => {
  const title = $("#f-title").value.trim();
  const start = $("#f-start").value;
  if(!title){ toast("Give the trip a name"); $("#f-title").focus(); return; }
  if(!start){ toast("Pick a start date"); $("#f-start").focus(); return; }
  let end = $("#f-end").value;
  if(end && end < start){ const tmp = end; end = start; /* swap */ $("#f-start").value = tmp; }
  const trip = {
    id: editingId || uid(),
    title,
    place: $("#f-place").value.trim(),
    start: $("#f-start").value,
    end: end || "",
    tags: $("#f-tags").value.split(",").map(s=>s.trim()).filter(Boolean),
    notes: $("#f-notes").value.trim()
  };
  const wasEditing = !!editingId;
  if(wasEditing){
    const i = state.trips.findIndex(t => t.id === editingId);
    state.trips[i] = trip;
  }else{
    state.trips.push(trip);
  }
  save(); closeSheet(); renderTrips();
  toast(wasEditing ? "Trip updated" : "Trip logged");
});

$("#btn-delete").addEventListener("click", () => {
  if(!editingId) return;
  if(!confirm("Delete this trip? This can't be undone.")) return;
  state.trips = state.trips.filter(t => t.id !== editingId);
  if(activeTag && !allTags().includes(activeTag)) activeTag = null;
  save(); closeSheet(); renderTrips();
  toast("Trip deleted");
});

/* ---------- generic list rendering ---------- */
function renderList(listKey, ulSel){
  const ul = $(ulSel);
  const items = state[listKey];
  if(!items.length){
    ul.innerHTML = `<div class="empty"><b>Nothing here yet</b>Add your first item above.</div>`;
    return;
  }
  ul.innerHTML = items.map(it => `
    <li class="${it.done ? "done" : ""}" data-id="${it.id}">
      <button class="tick" role="checkbox" aria-checked="${it.done}" aria-label="${escapeHtml(it.text)}">
        <svg viewBox="0 0 24 24"><path d="M5 13 l5 5 9-11"/></svg>
      </button>
      <span class="txt">${escapeHtml(it.text)}</span>
      <button class="del" aria-label="Remove ${escapeHtml(it.text)}">✕</button>
    </li>`).join("");
  ul.querySelectorAll("li").forEach(li => {
    const id = li.dataset.id;
    li.querySelector(".tick").addEventListener("click", () => {
      const it = state[listKey].find(x => x.id === id);
      it.done = !it.done;
      save(); renderList(listKey, ulSel);
    });
    li.querySelector(".del").addEventListener("click", () => {
      state[listKey] = state[listKey].filter(x => x.id !== id);
      save(); renderList(listKey, ulSel);
    });
  });
}
function addItem(listKey, inputSel, ulSel){
  const inp = $(inputSel);
  const text = inp.value.trim();
  if(!text) return;
  state[listKey].push({id:uid(), text, done:false});
  inp.value = "";
  save(); renderList(listKey, ulSel);
  inp.focus();
}

$("#check-add").addEventListener("click", () => addItem("checklist","#check-input","#checklist"));
$("#check-input").addEventListener("keydown", e => { if(e.key === "Enter") addItem("checklist","#check-input","#checklist"); });
$("#btn-reset-checks").addEventListener("click", () => {
  state.checklist.forEach(it => it.done = false);
  save(); renderList("checklist","#checklist");
  toast("Checklist reset");
});

$("#todo-add").addEventListener("click", () => addItem("todos","#todo-input","#todolist"));
$("#todo-input").addEventListener("keydown", e => { if(e.key === "Enter") addItem("todos","#todo-input","#todolist"); });
$("#btn-clear-done").addEventListener("click", () => {
  state.todos = state.todos.filter(it => !it.done);
  save(); renderList("todos","#todolist");
});

/* ---------- backup ---------- */
$("#btn-export").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "camplog-backup-" + todayStr() + ".json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=> URL.revokeObjectURL(a.href), 4000);
});
$("#btn-import").addEventListener("click", () => $("#import-file").click());
$("#import-file").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const data = JSON.parse(r.result);
      if(!data || !Array.isArray(data.trips)) throw new Error("bad");
      state = {
        trips: data.trips,
        checklist: Array.isArray(data.checklist) ? data.checklist : state.checklist,
        todos: Array.isArray(data.todos) ? data.todos : state.todos
      };
      save(); renderTrips(); renderList("checklist","#checklist"); renderList("todos","#todolist");
      toast("Backup restored");
    }catch(err){
      toast("That file isn't a Camp Log backup");
    }
  };
  r.readAsText(file);
  e.target.value = "";
});

/* ---------- init ---------- */
renderTrips();
renderList("checklist","#checklist");
renderList("todos","#todolist");

if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
