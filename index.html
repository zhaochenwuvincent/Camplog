<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Camp Log</title>
<meta name="description" content="A pocket logbook for camping trips.">
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Camp Log">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<meta name="theme-color" content="#D9DCD6">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ── poster-collage palette (ported from poster-kit.jsx · POST) ── */
:root{
  --ink:#23211C; --ink-soft:#6F6757;
  --olive:#6E7245; --olive-d:#585B36;
  --sage:#C4CBC2; --sage-d:#AEB6AC;
  --wood:#7E5A43; --wood-d:#5C3F2C;
  --kraft:#D9C4A1; --kraft-l:#E4D4B6;
  --cream:#F1ECE0; --cream-d:#E7E0D0;
  --coral:#C0734A; --coral-d:#A85E38;
  --yellow:#D6C24C; --yellow-hi:#E7D656;
  --page:#D9DCD6; --gray:#C9C8C1;
  --disp:"Archivo",system-ui,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:var(--mono);background:var(--page);color:var(--ink);min-height:100%;
  line-height:1.45;overscroll-behavior-y:none;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea,select{font:inherit;color:inherit}
svg{display:block}

#app{position:relative;width:100%;max-width:402px;margin:0 auto;min-height:100vh;
  padding-top:var(--safe-top);padding-bottom:calc(var(--safe-bot) + 132px);overflow-x:clip}
.screen{display:none}
.screen.active{display:block;animation:fade .2s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
@media (prefers-reduced-motion: reduce){.screen.active,.bounce{animation:none !important}*{transition:none !important}}

/* ── parallax depth (poster marks drift on scroll / pointer-tilt) ── */
[data-px]{will-change:transform}
@media (prefers-reduced-motion: reduce){[data-px]{translate:none !important}}

/* ── giant typographic wordmark / labels ── */
.wordmark{font-family:var(--disp);font-weight:900;line-height:.88;letter-spacing:-.03em;
  color:var(--gray);white-space:nowrap;transform:scaleX(.96);transform-origin:left}
.poster-label{font-family:var(--disp);font-weight:900;line-height:.9;letter-spacing:-.01em;
  color:var(--coral);text-transform:uppercase}

/* ── chips / highlighter ── */
.chip{display:inline-block;background:var(--wood);color:#F3EAD6;font-family:var(--mono);font-weight:600;
  font-size:12px;letter-spacing:.04em;padding:3px 9px;white-space:nowrap}
.chip.off{background:transparent;color:var(--ink-soft);box-shadow:inset 0 0 0 1.5px var(--sage-d)}
.chip-btn{border:none;cursor:pointer;padding:0;background:transparent}
.hl{display:inline-block;position:relative;transform:rotate(-1.5deg)}
.hl::before{content:"";position:absolute;inset:8% -6% 6% -6%;background:var(--yellow-hi);z-index:0;
  clip-path:polygon(1% 8%,99% 0%,100% 88%,2% 100%)}
.hl b{position:relative;z-index:1;font-family:var(--mono);font-weight:600;font-size:12px;color:var(--ink);letter-spacing:.02em}

/* ── paper card ── */
.paper{position:relative;background:var(--cream);border-radius:14px;
  box-shadow:0 14px 30px rgba(34,30,24,.22),0 2px 6px rgba(34,30,24,.14)}

/* ── tactile bounce on tap (cards / rows that don't navigate) ── */
@keyframes bounce-tap{0%{scale:1}25%{scale:.955}55%{scale:1.022}78%{scale:.992}100%{scale:1}}
.bounce{animation:bounce-tap .36s ease-out}
/* ── ⓘ corner button → edit affordance ── */
.trip-info{transition:transform .12s ease}
.trip-info:active{transform:scale(.82)}

/* ── swipe row ── */
.swipe{position:relative;overflow:hidden}
.swipe-actions{position:absolute;inset:0;display:flex;justify-content:flex-end}
.swipe-actions button{width:74px;border:none;cursor:pointer;font-family:var(--mono);
  font-size:11px;font-weight:700;letter-spacing:.1em;color:#F1ECE0}
.swipe-edit{background:var(--olive)}
.swipe-del{background:var(--coral-d)}
.swipe-fore{position:relative;will-change:transform;touch-action:pan-y;background:var(--cream)}

/* ── floating seal (FAB) ── */
.fab-host{position:fixed;left:50%;transform:translateX(-50%);width:100%;max-width:402px;
  bottom:0;height:0;z-index:29;pointer-events:none}
.fab{position:absolute;right:14px;bottom:calc(var(--safe-bot) + 92px);border:none;background:transparent;
  cursor:pointer;padding:0;pointer-events:auto;transition:transform .12s}
.fab.press{transform:scale(.93)}
.fab[hidden]{display:none}

/* ── geo tab bar ── */
nav.tabbar{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:402px;z-index:30;
  background:var(--cream);box-shadow:0 -6px 22px rgba(34,30,24,.10),0 -1px 6px rgba(34,30,24,.05);padding:12px 6px calc(var(--safe-bot) + 14px);display:flex}
.tabbar .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--ink-soft);
  font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.tabbar .tab.active{color:var(--coral)}
.tabbar .tab:focus-visible{outline:2px solid var(--coral);outline-offset:3px;border-radius:6px}

/* ── bottom sheet ── */
.sheet-backdrop{position:fixed;inset:0;background:rgba(34,30,24,.5);z-index:40;opacity:0;
  pointer-events:none;transition:opacity .25s}
.sheet-backdrop.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:50%;bottom:0;width:100%;max-width:402px;z-index:41;background:var(--cream);
  border-radius:22px 22px 0 0;box-shadow:0 -16px 40px rgba(34,30,24,.35);overflow:hidden;
  max-height:94vh;overflow-y:auto;transform:translateX(-50%) translateY(110%);
  transition:transform .32s cubic-bezier(.2,.85,.25,1)}
.sheet.open{transform:translateX(-50%) translateY(0)}
.sheet-grab{width:44px;height:5px;border-radius:3px;background:var(--sage-d);margin:0 auto 16px}
.sheet-body{position:relative;z-index:2;padding:22px 22px calc(var(--safe-bot) + 26px)}
.sheet-head{display:flex;align-items:flex-start;justify-content:space-between}
.sheet-rule{height:2.5px;background:var(--ink);margin:16px 0 18px}
.btn-close{width:34px;height:34px;border:2px solid var(--ink);border-radius:9px;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto}

/* ── underline fields ── */
.f-field{display:block;margin-bottom:16px}
.f-label{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--ink-soft);
  text-transform:uppercase;margin-bottom:6px}
.f-input{width:100%;border:none;border-bottom:2px solid var(--ink);background:transparent;
  padding:5px 2px;outline:none;font-family:var(--mono);font-weight:600;font-size:15px;
  letter-spacing:.02em;color:var(--ink);min-height:34px}
.f-input.big{font-family:var(--disp);font-weight:800;font-size:24px;letter-spacing:-.01em}
.f-input::placeholder{color:var(--sage-d)}
textarea.f-input{resize:vertical;min-height:60px;border:1.5px solid var(--ink);border-radius:10px;padding:9px 10px}
.f-row{display:flex;gap:16px}

.btn-create{width:100%;border:none;cursor:pointer;background:var(--coral);color:#F6EFE2;font-family:var(--disp);
  font-weight:900;font-size:18px;letter-spacing:.02em;text-transform:uppercase;padding:15px 0;border-radius:12px}
.btn-create:active{transform:scale(.99)}
.btn-delete{width:100%;background:none;color:var(--coral-d);font-family:var(--mono);font-weight:700;
  text-transform:uppercase;font-size:12px;letter-spacing:.1em;padding:13px 0;margin-top:8px;cursor:pointer}

/* ── content sheet zone (flow-root blocks margin-collapse so the brown band + label overlap as designed, without clipping the bleeding marks) ── */
.sheet-zone{position:relative;display:flow-root;padding-bottom:8px}

/* ── helper / footer text ── */
.helper{text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--ink-soft);text-transform:uppercase}
.helper button{font:inherit;color:var(--ink-soft);text-decoration:underline;text-underline-offset:3px;letter-spacing:.12em;cursor:pointer}
.empty-note{font-family:var(--mono);font-size:13px;color:var(--ink-soft);text-align:center;padding:18px 8px;line-height:1.6}

/* ── toast ── */
.toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);
  bottom:calc(var(--safe-bot) + 168px);z-index:60;background:var(--ink);color:var(--cream);
  padding:10px 18px;border-radius:999px;font-family:var(--mono);font-size:.76rem;font-weight:600;
  opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ════════════ drifting black-dot particle layer (Log screen) ════════════ */
#dot-particles{position:fixed;left:50%;transform:translateX(-50%);top:0;width:100%;max-width:402px;
  height:100vh;height:100dvh;z-index:22;pointer-events:none}
@media (prefers-reduced-motion: reduce){#dot-particles{display:none !important}}

/* ════════════ Campfire activities ════════════ */
.act-grid{display:flex;flex-direction:column;gap:13px}
.act-card{position:relative;width:100%;text-align:left;display:flex;align-items:center;gap:15px;
  background:var(--cream);border-radius:14px;padding:15px 16px;
  box-shadow:0 10px 24px rgba(34,30,24,.16),0 2px 5px rgba(34,30,24,.10)}
.act-ico{width:52px;height:52px;flex:0 0 auto;border-radius:13px;display:flex;align-items:center;justify-content:center}
.act-arrow{margin-left:auto;flex:0 0 auto;color:var(--ink-soft)}

.back-btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);cursor:pointer;padding:6px 2px}
.back-btn:active{transform:scale(.96)}

/* die faces */
.die{width:62px;height:62px;border-radius:13px;background:var(--cream);border:2.5px solid var(--ink);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  font-family:var(--disp);font-weight:900;color:var(--ink);
  box-shadow:0 6px 14px rgba(34,30,24,.18)}
@keyframes die-tumble{0%{transform:rotate(0) scale(1)}25%{transform:rotate(-15deg) scale(1.08)}
  50%{transform:rotate(13deg) scale(.95)}75%{transform:rotate(-7deg) scale(1.05)}100%{transform:rotate(0) scale(1)}}
.die.tumble{animation:die-tumble .2s linear infinite}
.pip-grid{width:64%;height:64%;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr)}
.pip-grid span{display:flex;align-items:center;justify-content:center}
.pip{width:9px;height:9px;border-radius:50%;background:var(--ink)}

/* coin */
.coin{width:118px;height:118px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-weight:900;font-size:34px;color:#F6EFE2;background:var(--wood);letter-spacing:.02em;
  box-shadow:0 12px 26px rgba(34,30,24,.30),inset 0 0 0 5px rgba(255,255,255,.18)}
@keyframes coin-spin{0%{transform:rotateY(0) scale(1)}50%{transform:rotateY(900deg) scale(1.08)}100%{transform:rotateY(1800deg) scale(1)}}
.coin.flipping{animation:coin-spin .72s ease-out}

/* segmented control + stepper + side chips */
.seg{display:inline-flex;background:var(--sage);border-radius:10px;padding:3px;gap:3px}
.seg button{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.03em;padding:7px 13px;border-radius:8px;color:var(--ink-soft)}
.seg button.on{background:var(--cream);color:var(--ink);box-shadow:0 1px 3px rgba(34,30,24,.18)}
.stepper{display:inline-flex;align-items:center;border:2px solid var(--ink);border-radius:10px;overflow:hidden}
.stepper button{width:38px;height:34px;font-family:var(--disp);font-weight:900;font-size:20px;background:var(--cream)}
.stepper button:active{background:var(--sage)}
.stepper .val{min-width:42px;text-align:center;font-family:var(--disp);font-weight:900;font-size:18px;
  border-left:2px solid var(--ink);border-right:2px solid var(--ink);height:34px;line-height:34px}
.side-chip{font-family:var(--mono);font-size:12px;font-weight:700;padding:6px 11px;border-radius:8px;
  background:transparent;box-shadow:inset 0 0 0 1.5px var(--sage-d);color:var(--ink-soft)}
.side-chip.on{background:var(--olive);color:#F1ECE0;box-shadow:none}

/* prompt / spinner cards */
.prompt-card{background:var(--kraft);border-radius:14px;padding:24px 20px;min-height:138px;width:100%;
  display:flex;flex-direction:column;justify-content:center;box-shadow:0 10px 24px rgba(34,30,24,.16)}
.spin-name{padding:11px 14px;border-radius:10px;font-family:var(--mono);font-weight:600;font-size:15px;
  background:var(--cream);display:flex;align-items:center;gap:10px;box-shadow:0 2px 6px rgba(34,30,24,.10);
  transition:transform .08s ease,background .08s ease}
.spin-name.lit{background:var(--coral);color:#F6EFE2;transform:scale(1.03)}
.spin-name.win{background:var(--olive);color:#F1ECE0;transform:scale(1.03)}
</style>
</head>
<body>

<div id="app">
  <section class="screen active" id="screen-log" aria-label="Log"></section>
  <section class="screen" id="screen-packing" aria-label="Packing"></section>
  <section class="screen" id="screen-todo" aria-label="To-do"></section>
  <section class="screen" id="screen-campfire" aria-label="Campfire"></section>
</div>

<canvas id="dot-particles" aria-hidden="true"></canvas>
<div class="fab-host"><button class="fab" id="fab"></button></div>

<nav class="tabbar" id="tabbar" aria-label="Sections"></nav>

<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true"></div>

<div class="toast" id="toast" role="status"></div>
<input type="file" id="import-file" accept="application/json,.json" hidden>

<script>
"use strict";

/* ════════════ colour constants (for inline SVG marks) ════════════ */
const INK="#23211C",INKSOFT="#6F6757",OLIVE="#6E7245",OLIVED="#585B36",
  SAGE="#C4CBC2",SAGED="#AEB6AC",WOOD="#7E5A43",WOODD="#5C3F2C",
  KRAFT="#D9C4A1",CREAM="#F1ECE0",CORAL="#C0734A",CORALD="#A85E38",
  YELLOW="#D6C24C",PAGE="#D9DCD6";

const $ = (s,r=document) => r.querySelector(s);
const KEY = "camplog.v1";

/* ════════════ state ════════════ */
const SEED = {
  trips: [
    { title:"Lakeside Long Weekend", place:"Lake Sagami", start:"2026-06-19", end:"2026-06-21",
      tags:["lake","with family"], notes:"Site A-12 · canoe booked\nbring marshmallows" },
    { title:"Fuji Foothills", place:"Fumotoppara", start:"2026-05-02", end:"2026-05-04", tags:["views","group"], notes:"" },
    { title:"First Solo Overnight", place:"Doshi Valley", start:"2026-04-11", end:"2026-04-12", tags:["solo"], notes:"" },
    { title:"Cherry Blossom Camp", place:"Lake Motosu", start:"2026-03-28", end:"2026-03-29", tags:["spring"], notes:"" },
  ],
  checklist: [
    ["Tent + stakes",1],["Sleeping bags",1],["Sleeping pads",1],["Stove + fuel",1],
    ["Lighter / matches",1],["Cookware + utensils",1],["Water",1],["Headlamps",1],
    ["First aid kit",1],["Trash bags",0],["Power bank",0],["Rain layer",0],
  ],
  todos: [
    ["Confirm canoe rental",1,"Before You Go"],["Buy marshmallows + snacks",0,"Before You Go"],
    ["Charge power bank + lights",0,"Before You Go"],["Download offline maps",1,"Before You Go"],
    ["Pitch tent before dark",0,"At Camp"],["Filter water from lake",0,"At Camp"],["Hang bear bag",0,"At Camp"],
  ],
};

function seed(){
  return {
    trips: SEED.trips.map(t => ({ id:uid(), ...t })),
    checklist: SEED.checklist.map(([text,done]) => ({ id:uid(), text, done:!!done })),
    todos: SEED.todos.map(([text,done,group]) => ({ id:uid(), text, done:!!done, group })),
    campfire: defaultCampfire(),
  };
}
function migrate(s){
  s.trips    = (s.trips||[]).map(t => ({ tags:[], notes:"", place:"", end:"", ...t }));
  s.checklist= (s.checklist||[]).map(it => ({ done:false, ...it }));
  s.todos    = (s.todos||[]).map(it => ({ done:false, group:it.group||"Tasks", ...it, group:it.group||"Tasks" }));
  const dc=defaultCampfire(); s.campfire = s.campfire || {};
  s.campfire.dice = { ...dc.dice, ...(s.campfire.dice||{}) };
  s.campfire.spinner = Array.isArray(s.campfire.spinner) ? s.campfire.spinner : dc.spinner;
  return s;
}
function load(){
  try{ const raw = localStorage.getItem(KEY); if(raw) return migrate(JSON.parse(raw)); }catch(e){}
  return seed();
}
let state = load();
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/* ════════════ date / format helpers ════════════ */
const MON = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const MONT= ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function todayStr(){ const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function dParts(s){ const [y,m,d]=s.split("-").map(Number); return {y,m:m-1,d}; }
function nights(start,end){ if(!end) return 0;
  return Math.max(0, Math.round((new Date(end+"T00:00") - new Date(start+"T00:00"))/86400000)); }
function dayRange(start,end){
  const a=dParts(start);
  if(!end || end===start) return String(a.d);
  const b=dParts(end);
  if(a.m===b.m && a.y===b.y) return a.d+"–"+b.d;
  return a.d+"–"+MONT[b.m]+" "+b.d;
}
function listDate(t){
  const a=dParts(t.start); const n=nights(t.start,t.end);
  const yr="’"+t.start.slice(2,4);
  const nn = n>0 ? " · "+n+"N" : "";
  return MON[a.m]+" "+dayRange(t.start,t.end)+" "+yr+nn;
}
function countdown(start){
  const days = Math.round((new Date(start+"T00:00") - new Date(todayStr()+"T00:00"))/86400000);
  if(days<0) return "";
  if(days===0) return "TODAY";
  if(days===1) return "TOMORROW";
  if(days<14) return "IN "+days+" DAYS";
  return "IN "+Math.round(days/7)+" WEEKS";
}
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),1800); }

/* ════════════ decoration builders (ported from poster-kit.jsx) ════════════ */
/* optional trailing `px` arg = parallax speed (see parallax engine below) */
function pxA(px){ return (px==null) ? "" : ` data-px="${px}"`; }
function block(x,y,w,h,bg,z,extra,px){
  return `<div${pxA(px)} style="position:absolute;left:${x};top:${y};width:${w};height:${h};background:${bg};z-index:${z||0};${extra||""}"></div>`;
}
function blobHTML(w,rot,style,px){
  const h=Math.round(w*0.82);
  return `<svg${pxA(px)} width="${w}" height="${h}" viewBox="0 0 240 196" style="transform:rotate(${rot}deg);${style||""}" aria-hidden="true"><path fill="${INK}" d="M58 14 C92 -2 120 6 138 12 C150 4 170 2 178 18 C196 16 210 30 206 50 C224 60 232 84 218 102 C228 122 214 146 192 148 C184 168 158 174 140 164 C120 178 92 176 78 160 C52 168 26 154 26 130 C6 122 -2 96 14 78 C2 56 18 30 42 30 C44 18 50 16 58 14 Z"></path></svg>`;
}
function dotHTML(size,color,style,px){
  return `<div${pxA(px)} style="position:absolute;width:${size}px;height:${size}px;border-radius:50%;background:${color};${style||""}"></div>`;
}
const TETRO={ l:[[0,0],[0,1],[0,2],[1,2]], s:[[1,0],[0,1],[1,1],[0,2]],
  t:[[0,0],[1,0],[2,0],[1,1]], step:[[1,0],[0,1],[1,1],[0,2],[1,2]] };
function tetroHTML(shape,s,color,style,px){
  const cells=TETRO[shape]||TETRO.l;
  const cols=Math.max(...cells.map(c=>c[0]))+1, rows=Math.max(...cells.map(c=>c[1]))+1;
  const inner=cells.map(([c,r])=>`<div style="position:absolute;left:${c*s}px;top:${r*s}px;width:${s}px;height:${s}px;background:${color}"></div>`).join("");
  return `<div${pxA(px)} style="position:absolute;width:${s*cols}px;height:${s*rows}px;${style||""}" aria-hidden="true">${inner}</div>`;
}
function waveHTML(w,h,color,sw,lines,style){
  let paths="";
  for(let i=0;i<lines;i++){
    const y=h*(0.28+i*(0.44/Math.max(1,lines-1)));
    const amp=18-i*2;
    const d=`M -10 ${y} C ${w*0.22} ${y-amp}, ${w*0.34} ${y+amp}, ${w*0.52} ${y-amp*0.4} S ${w*0.82} ${y+amp}, ${w+10} ${y-amp*0.5}`;
    paths+=`<path d="${d}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"></path>`;
  }
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="${style||""}" aria-hidden="true">${paths}</svg>`;
}
function topoHTML(w,color,sw,style,px,lines){
  lines=lines||6; sw=sw||2.6;
  var h=Math.round(w*1.25), N=12, paths="";
  for(var j=0;j<lines;j++){
    var f=lines>1?j/(lines-1):0;
    var startX=w*(0.60-0.08*f), endX=w*(0.36-0.30*f);
    var amp=6+4*Math.sin(j*1.7), freq=1.8, phase=j*0.8;
    var p=[];
    for(var i=0;i<=N;i++){
      var t=i/N;
      var x=startX+(endX-startX)*t+Math.sin(t*Math.PI*freq+phase)*amp*(0.4+0.6*t);
      var y=h*(0.03+0.94*t);
      p.push([x,y]);
    }
    var d="M "+p[0][0].toFixed(1)+" "+p[0][1].toFixed(1)+" ";
    for(var i=0;i<p.length-1;i++){
      var p0=p[Math.max(0,i-1)],p1=p[i],p2=p[i+1],p3=p[Math.min(p.length-1,i+2)];
      var c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6;
      var c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
      d+="C "+c1x.toFixed(1)+" "+c1y.toFixed(1)+" "+c2x.toFixed(1)+" "+c2y.toFixed(1)+" "+p2[0].toFixed(1)+" "+p2[1].toFixed(1)+" ";
    }
    paths+='<path d="'+d+'"></path>';
  }
  return '<svg'+pxA(px)+' width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="position:absolute;'+(style||"")+'" aria-hidden="true"><g fill="none" stroke="'+color+'" stroke-width="'+sw+'" stroke-opacity="0.6" stroke-linecap="round" stroke-linejoin="round">'+paths+'</g></svg>';
}
function squiggleHTML(w,color,sw,style,px){
  return `<svg${pxA(px)} width="${w}" height="${Math.round(w*1.15)}" viewBox="0 0 150 172" style="position:absolute;${style||""}" aria-hidden="true"><path fill="none" stroke="${color}" stroke-width="${sw||11}" stroke-linecap="round" stroke-linejoin="round" d="M14 26 C14 8 40 6 52 16 C66 28 50 48 32 46 C10 44 6 70 26 78 C50 88 78 70 70 46 C64 28 86 20 100 32 C118 47 102 78 78 96 C50 117 78 138 104 128 C126 120 140 138 132 156"></path></svg>`;
}
function arrowTileHTML(size,style,px){
  const a=Math.round(size*0.62);
  return `<div${pxA(px)} style="position:absolute;width:${size}px;height:${size}px;background:${YELLOW};display:flex;align-items:center;justify-content:center;${style||""}" aria-hidden="true"><svg width="${a}" height="${a}" viewBox="0 0 24 24" fill="none" stroke="${INK}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5 L19 19 M19 9 V19 H9"></path></svg></div>`;

function infoDotHTML(size,style){

/* die-cut starburst seal */
function sealPoints(points){ const pts=[];
  for(let i=0;i<points*2;i++){ const a=(i/(points*2))*Math.PI*2 - Math.PI/2; const r=i%2===0?50:41;
    pts.push((50+Math.cos(a)*r).toFixed(2)+","+(50+Math.sin(a)*r).toFixed(2)); }
  return pts.join(" "); }

/* view + animation bookkeeping (volatile; not persisted) */
let campfireView=null, campTimers=[], campRaf=0;
let diceRolling=false, coinFlipping=false, spinning=false;

function campTimeout(fn,ms){ const id=setTimeout(fn,ms); campTimers.push(["t",id]); return id; }
function campInterval(fn,ms){ const id=setInterval(fn,ms); campTimers.push(["i",id]); return id; }
function stopCampAnim(){
  campTimers.forEach(p=> p[0]==="i" ? clearInterval(p[1]) : clearTimeout(p[1]));
  campTimers=[]; if(campRaf){ cancelAnimationFrame(campRaf); campRaf=0; }
  diceRolling=coinFlipping=spinning=false;
}
/* draw a random index from a deck, avoiding an immediate repeat */
function drawIdx(len,prev){ if(len<=1) return 0; let i; do{ i=Math.floor(Math.random()*len); }while(i===prev); return i; }

function renderCampfire(){
  stopCampAnim();
  const scr=$("#screen-campfire");
  if(!campfireView){ scr.innerHTML=campfireListHTML(); wireCampfireList(); }
  else{
    const a=ACTIVITIES.find(x=>x.key===campfireView)||ACTIVITIES[0];
    scr.innerHTML=campfireShell(a); renderActivityBody(a.key); wireCampBack();
  }
  collectParallax();
}

/* ════ activity · DICE ROLL ════ */
const PIPS={1:[4],2:[2,6],3:[2,4,6],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
function pipHTML(v){
  const set=PIPS[v]||[]; let cells="";
  for(let i=0;i<9;i++) cells+=`<span>${set.indexOf(i)>=0?'<i class="pip"></i>':""}</span>`;
  return `<span class="pip-grid">${cells}</span>`;
}
function diceFaces(cfg,liveStr){
  if(cfg.mode==="custom"){
    const raw=(liveStr!=null?liveStr:cfg.faces)||"";
    const arr=raw.split(",").map(s=>s.trim()).filter(Boolean);
    return arr.length?arr:["?"];
  }
  const a=[]; for(let i=1;i<=cfg.sides;i++) a.push(i); return a;
}
function dieFaceHTML(value,cfg){
  if(cfg.mode!=="custom" && cfg.sides===6 && typeof value==="number") return pipHTML(value);
  const s=String(value);
  const fs = s.length<=2?24 : s.length<=4?17 : s.length<=7?12 : 10;
  return `<span style="font-size:${fs}px;line-height:1.05;padding:3px;text-align:center;word-break:break-word">${esc(s)}</span>`;
}
function diceSummary(vals,cfg){
  if(cfg.mode==="custom") return vals.map(v=>`<b style="color:var(--ink)">${esc(String(v))}</b>`).join(" · ");
  const total=vals.reduce((a,b)=>a+b,0);
  if(vals.length===1) return `You rolled <b style="color:var(--ink);font-size:16px">${total}</b>`;
  return vals.join(" + ")+` = <b style="color:var(--coral-d);font-size:16px">${total}</b>`;
}
function bodyDice(){
  const cfg=state.campfire.dice, body=$("#cf-body");
  const dice = Array.from({length:cfg.count},(_,i)=>`<div class="die" data-i="${i}">${dieFaceHTML(lastDice?lastDice[i]:"?",cfg)}</div>`).join("");
  const sideChips=[4,6,8,10,12,20].map(n=>`<button class="side-chip ${cfg.mode!=="custom"&&cfg.sides===n?"on":""}" data-side="${n}" ${cfg.mode==="custom"?'disabled style="opacity:.4"':""}>d${n}</button>`).join("");
  body.innerHTML=`
    <div id="dice-tray" style="display:flex;flex-wrap:wrap;gap:12px;justify-content:center;align-items:center;min-height:74px">${dice}</div>
    <div id="dice-total" style="text-align:center;font-family:var(--mono);font-size:13px;color:var(--ink-soft);margin-top:14px;min-height:20px">${lastDice?diceSummary(lastDice,cfg):"Tap roll to throw the dice"}</div>
    <button class="btn-create" id="dice-roll" style="margin-top:16px">Roll</button>
    <div style="margin-top:26px;display:flex;flex-direction:column;gap:18px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="f-label" style="margin:0">How many dice</span>
        <div class="stepper"><button data-d="-1" aria-label="fewer">−</button><span class="val">${cfg.count}</span><button data-d="1" aria-label="more">+</button></div>
      </div>
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span class="f-label" style="margin:0">Faces</span>
          <div class="seg"><button data-mode="number" class="${cfg.mode!=="custom"?"on":""}">Numbers</button><button data-mode="custom" class="${cfg.mode==="custom"?"on":""}">Custom</button></div>
        </div>
        <div id="sides-row" style="display:${cfg.mode==="custom"?"none":"flex"};flex-wrap:wrap;gap:8px">${sideChips}</div>
        <div id="custom-row" style="display:${cfg.mode==="custom"?"block":"none"}">
          <input class="f-input" id="dice-faces" placeholder="Yes, No, Maybe" value="${esc(cfg.faces||"")}">
          <div class="helper" style="text-align:left;margin-top:7px">Separate each face with a comma</div>
        </div>
      </div>
    </div>`;
  $("#dice-roll").addEventListener("click",rollDice);
  body.querySelectorAll(".stepper button").forEach(b=>b.addEventListener("click",()=>{
    cfg.count=Math.max(1,Math.min(8,cfg.count+(+b.dataset.d))); lastDice=null; save(); bodyDice();
  }));
  body.querySelectorAll(".side-chip").forEach(b=>b.addEventListener("click",()=>{
    if(cfg.mode==="custom") return; cfg.sides=+b.dataset.side; lastDice=null; save(); bodyDice();
  }));
  body.querySelectorAll(".seg button").forEach(b=>b.addEventListener("click",()=>{
    const m=b.dataset.mode; if(cfg.mode===m) return;
    if(cfg.mode==="custom" && $("#dice-faces")) cfg.faces=$("#dice-faces").value;   // keep typed faces
    cfg.mode=m; lastDice=null; save(); bodyDice();
  }));
  const fi=$("#dice-faces");
  fi&&fi.addEventListener("change",()=>{ cfg.faces=fi.value; save(); });
}
function rollDice(){
  if(diceRolling) return;
  const cfg=state.campfire.dice, tray=$("#dice-tray"); if(!tray) return;
  const liveStr = (cfg.mode==="custom" && $("#dice-faces")) ? $("#dice-faces").value : null;
  if(liveStr!=null){ cfg.faces=liveStr; save(); }
  const faces=diceFaces(cfg,liveStr);
  const dieEls=Array.prototype.slice.call(tray.querySelectorAll(".die"));
  const pick=()=>faces[Math.floor(Math.random()*faces.length)];
  const finalVals=dieEls.map(pick);
  const settle=()=>{
    dieEls.forEach((el,i)=>{ el.classList.remove("tumble"); el.innerHTML=dieFaceHTML(finalVals[i],cfg); bounceTap(el); });
    lastDice=finalVals;
    const tot=$("#dice-total"); if(tot) tot.innerHTML=diceSummary(finalVals,cfg);
    diceRolling=false;
  };
  if(CAMP_REDUCE){ settle(); return; }
  diceRolling=true;
  dieEls.forEach(el=>el.classList.add("tumble"));
  let ticks=0;
  campInterval(()=>{
    dieEls.forEach(el=> el.innerHTML=dieFaceHTML(pick(),cfg));
    if(++ticks>=12){ stopCampAnim(); settle(); }
  },55);
}

function coinHistHTML(){
  if(!coinHist.length) return '<span style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">No flips yet</span>';
  return coinHist.slice(0,16).map(h=>`<span style="width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:11px;color:#F6EFE2;background:${h==="H"?"var(--coral)":"var(--olive)"}">${h}</span>`).join("");
}
function bodyCoin(){
  const body=$("#cf-body"), top=coinHist[0];
  body.innerHTML=`
    <div style="display:flex;justify-content:center;margin-top:4px;perspective:700px">
      <div class="coin" id="cf-coin">${top||"?"}</div>
    </div>

    <button class="btn-create" id="cf-flip" style="margin-top:12px">Flip</button>
    <div style="margin-top:24px;text-align:center">
      <div class="f-label">Recent flips</div>
      <div id="cf-coin-hist" style="display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:9px;min-height:24px">${coinHistHTML()}</div>
    </div>`;
  if(top){ const c=$("#cf-coin"); c.style.background = top==="H"?"var(--coral)":"var(--olive)"; }
  $("#cf-flip").addEventListener("click",flipCoin);
}
function flipCoin(){
  if(coinFlipping) return;
  const coin=$("#cf-coin"), label=$("#cf-coin-label"); if(!coin) return;
  const res = Math.random()<0.5 ? "H" : "T";
  const done=()=>{
    coin.textContent=res; coin.style.background = res==="H"?"var(--coral)":"var(--olive)";
    if(label) label.textContent = res==="H"?"Heads":"Tails";
    coinHist.unshift(res); coinHist=coinHist.slice(0,40);
    const h=$("#cf-coin-hist"); if(h) h.innerHTML=coinHistHTML();
    coinFlipping=false;
  };
  if(CAMP_REDUCE){ done(); return; }
  coinFlipping=true;
  coin.classList.add("flipping");
  const iv=campInterval(()=>{ coin.textContent = Math.random()<0.5?"H":"T"; },70);
  campTimeout(()=>{ clearInterval(iv); coin.classList.remove("flipping"); done(); },720);
}

/* ════ activity · WHO'S UP? (name spinner) ════ */
function bodyPick(){
  const body=$("#cf-body"), names=state.campfire.spinner;
  const list = names.length
    ? names.map((n,i)=>`<div class="spin-name" data-i="${i}"><span style="flex:1">${esc(n)}</span><button class="spin-del" data-i="${i}" aria-label="remove" style="color:inherit;opacity:.55;line-height:0;padding:4px;font-size:15px">✕</button></div>`).join("")
    : `<div class="empty-note" style="padding:10px">Add a few names to spin.</div>`;
  body.innerHTML=`
    <div id="pick-result" style="text-align:center;font-family:var(--disp);font-weight:900;font-size:24px;min-height:30px;margin-bottom:2px">${pickWinner?esc(pickWinner)+" is up! 🔥":""}</div>
    <button class="btn-create" id="pick-spin" style="margin:6px 0 20px">Pick someone</button>
    <div id="pick-list" style="display:flex;flex-direction:column;gap:9px">${list}</div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <input class="f-input" id="pick-add" placeholder="+ add a name" style="flex:1">
      <button class="side-chip" id="pick-add-btn" style="padding:0 18px">Add</button>
    </div>`;
  $("#pick-spin").addEventListener("click",spinPick);
  const add=()=>{ const v=$("#pick-add").value.trim(); if(!v) return; state.campfire.spinner.push(v); save(); pickWinner=null; bodyPick(); };
  $("#pick-add-btn").addEventListener("click",add);
  $("#pick-add").addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); add(); } });
  body.querySelectorAll(".spin-del").forEach(b=>b.addEventListener("click",()=>{
    state.campfire.spinner.splice(+b.dataset.i,1); save(); pickWinner=null; bodyPick();
  }));
}
function spinPick(){
  const names=state.campfire.spinner;
  if(spinning) return;
  if(names.length<2){ toast("Add at least two names"); return; }
  pickWinner=null;
  const r=$("#pick-result"); if(r) r.textContent="";
  const all=Array.prototype.slice.call($("#pick-list").querySelectorAll(".spin-name"));
  const winner=Math.floor(Math.random()*names.length);
  const finish=i=>{
    all.forEach((e,j)=>{ e.classList.toggle("win",j===i); e.classList.remove("lit"); });
    pickWinner=names[i]; if(r) r.textContent=names[i]+" is up! 🔥"; spinning=false;
  };
  if(CAMP_REDUCE){ finish(winner); return; }
  spinning=true;
  const spins=2+Math.floor(Math.random()*2);
  const total=names.length*spins+winner+1;
  let step=0, idx=-1;
  (function tick(){
    idx=(idx+1)%names.length;
    all.forEach((e,i)=>e.classList.toggle("lit",i===idx));
    if(++step>=total){ finish(idx); return; }
    campTimeout(tick, 55 + Math.pow(step/total,2.6)*300);
  })();
}

/* little tactile bounce on tap, for cards/rows that no longer navigate */
function bounceTap(el){
  if(!el) return;
  clearTimeout(el._bounce);
  el.classList.remove("bounce");
  void el.offsetWidth;            // reflow so the animation restarts mid-bounce
  el.classList.add("bounce");
  el._bounce = setTimeout(()=>el.classList.remove("bounce"), 420);
}

/* ════════════ swipe-row interaction (ported from SwipeRow) ════════════ */
const SWIPE_OPEN = -148;
function attachSwipe(rowEl, {onTap,onEdit,onDelete}){
  const fore = rowEl.querySelector(".swipe-fore");
  const editBtn = rowEl.querySelector('[data-act="edit"]');
  const delBtn = rowEl.querySelector('[data-act="del"]');
  let dx=0, startX=null, moved=false;
  const setX=(x,anim)=>{ dx=x; fore.style.transition = anim ? "transform .22s cubic-bezier(.2,.8,.2,1)" : "none"; fore.style.transform=`translateX(${dx}px)`; };
  const getX=e=> e.touches ? e.touches[0].clientX : e.clientX;
  fore.addEventListener("pointerdown",e=>{ startX=getX(e)-dx; moved=false; });
  fore.addEventListener("pointermove",e=>{ if(startX==null) return;
    let nd=getX(e)-startX; if(nd>0)nd=0; if(nd<SWIPE_OPEN)nd=SWIPE_OPEN;
    if(Math.abs(nd-dx)>2) moved=true; setX(nd,false); });
  const up=()=>{ if(startX==null) return; startX=null; setX(dx<SWIPE_OPEN/2?SWIPE_OPEN:0,true); };
  fore.addEventListener("pointerup",up);
  fore.addEventListener("pointercancel",up);
  fore.addEventListener("pointerleave",()=>{ if(startX!=null) up(); });
  fore.addEventListener("click",e=>{ if(moved){ e.preventDefault(); return; }
    if(dx<0){ setX(0,true); return; } onTap&&onTap(); });
  editBtn&&editBtn.addEventListener("click",()=>{ setX(0,true); onEdit&&onEdit(); });
  delBtn&&delBtn.addEventListener("click",()=> onDelete&&onDelete());
}

/* ── trip create/edit sheet ── */
function allTags(){ const set=new Set(["lake","with family","solo","views","group","spring","autumn","winter"]);
  state.trips.forEach(t=>(t.tags||[]).forEach(g=>set.add(g))); return [...set]; }

function openTripSheet(id){
  const t = id ? state.trips.find(x=>x.id===id) : null;
  const sel = new Set(t ? (t.tags||[]) : []);
  const suggestions = allTags();
  const chips = suggestions.map(g=>`<button type="button" class="chip-btn tag-toggle" data-tag="${esc(g)}"><span class="chip ${sel.has(g)?"":"off"}">${esc(g)}</span></button>`).join("");
  openSheet(`
    ${sheetDecor()}
    <div class="sheet-body">
      <div class="sheet-grab"></div>
      ${sheetHead(t?"Edit Log":"New Log","PLAN A CAMPING TRIP")}
      <div class="sheet-rule"></div>
      <label class="f-field"><div class="f-label">Trip name</div>
        <input class="f-input big" id="f-title" placeholder="Lakeside Long Weekend" value="${t?esc(t.title):""}"></label>
      <div class="f-row">
        <label class="f-field" style="flex:1"><div class="f-label">Start</div>
          <input class="f-input" type="date" id="f-start" value="${t?t.start:todayStr()}"></label>
        <label class="f-field" style="flex:1"><div class="f-label">End</div>
          <input class="f-input" type="date" id="f-end" value="${t?(t.end||""):""}"></label>
      </div>
      <label class="f-field"><div class="f-label">Location</div>
        <input class="f-input" id="f-place" placeholder="Lake Sagami" value="${t?esc(t.place||""):""}"></label>
      <div class="f-label" style="margin:2px 0 9px">Tags</div>
      <div id="tag-box" style="display:flex;flex-wrap:wrap;gap:9px;margin-bottom:12px">${chips}</div>
      <input class="f-input" id="f-newtag" placeholder="+ add a tag" style="margin-bottom:20px;font-size:13px">
      <label class="f-field"><div class="f-label">Notes</div>
        <textarea class="f-input" id="f-notes" placeholder="Site number · weather · what to remember">${t?esc(t.notes||""):""}</textarea></label>
      <button class="btn-create" id="f-save">${t?"Save Log":"Create Log"}</button>
      ${t?`<button class="btn-delete" id="f-del">Delete this trip</button>`:""}
    </div>`);

  $("#sheet-x").addEventListener("click",closeSheet);
  $("#tag-box").addEventListener("click",e=>{
    const b=e.target.closest(".tag-toggle"); if(!b) return;
    const g=b.dataset.tag; if(sel.has(g))sel.delete(g); else sel.add(g);
    b.querySelector(".chip").classList.toggle("off",!sel.has(g));
  });
  $("#f-newtag").addEventListener("keydown",e=>{
    if(e.key!=="Enter") return; e.preventDefault();
    const g=e.target.value.trim().toLowerCase(); if(!g) return;
    sel.add(g);
    const box=$("#tag-box");
    if(!box.querySelector(`.tag-toggle[data-tag="${CSS.escape(g)}"]`)){
      box.insertAdjacentHTML("beforeend",`<button type="button" class="chip-btn tag-toggle" data-tag="${esc(g)}"><span class="chip">${esc(g)}</span></button>`);
    } else box.querySelector(`.tag-toggle[data-tag="${CSS.escape(g)}"] .chip`).classList.remove("off");
    e.target.value="";
  });
  $("#f-save").addEventListener("click",()=>{
    const title=$("#f-title").value.trim();
    let start=$("#f-start").value, end=$("#f-end").value;
    if(!title){ toast("Give the trip a name"); $("#f-title").focus(); return; }
    if(!start){ toast("Pick a start date"); $("#f-start").focus(); return; }
    if(end && end<start){ const tmp=start; start=end; end=tmp; }
    const trip={ id:id||uid(), title, place:$("#f-place").value.trim(),
      start, end:end||"", tags:[...sel], notes:$("#f-notes").value.trim() };
    if(id){ const i=state.trips.findIndex(x=>x.id===id); state.trips[i]=trip; }
    else state.trips.push(trip);
    save(); closeSheet(); renderLog();
    toast(id?"Trip updated":"Trip logged");
  });
  const del=$("#f-del");
  del&&del.addEventListener("click",()=>{ if(confirm("Delete this trip? This can't be undone.")) deleteTrip(id); });
}
function deleteTrip(id){ state.trips=state.trips.filter(t=>t.id!==id); save(); closeSheet(); renderLog(); toast("Trip deleted"); }

  openSheet(`

      ${sheetHead(it?(isTodo?"Edit Task":"Edit Gear"):(isTodo?"Add Task":"Add Gear"), isTodo?"WHAT NEEDS DOING":"WHAT TO PACK")}

$("#import-file").addEventListener("change",e=>{

        todos:Array.isArray(data.todos)?data.todos:state.todos });

    }catch(err){ toast("That file isn't a Camp Log backup"); } };
  r.readAsText(file); e.target.value="";
});

/* ════════════ parallax depth ════════════
   Floating poster marks carry a data-px speed. On scroll each is nudged by
   scrollY × speed (back layers lag → recede; negative → pops forward); the
   pointer adds a tiny tilt so the collage has depth even when still. We use the
   independent CSS `translate` property so it stacks with the existing
   transform:rotate()/scaleX() on blobs, seals and the wordmark instead of
   overwriting them. Honours prefers-reduced-motion. */
const PX_REDUCE = !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);
let pxEls=[], pxPointerX=0, pxPointerY=0, pxQueued=false;
function applyParallax(){
  pxQueued=false;
  const y = window.pageYOffset || document.documentElement.scrollTop || 0;
  for(let i=0;i<pxEls.length;i++){
    const el=pxEls[i], p=el._px, depth=Math.abs(p);
    const tx = pxPointerX*depth*16;
    const ty = y*p + pxPointerY*depth*12;
    el.style.translate = tx.toFixed(2)+"px "+ty.toFixed(2)+"px";
  }
}
function queueParallax(){ if(PX_REDUCE||pxQueued) return; pxQueued=true; requestAnimationFrame(applyParallax); }
function collectParallax(){
  const screen=$(".screen.active");
  pxEls = screen ? Array.prototype.slice.call(screen.querySelectorAll("[data-px]")) : [];
  for(let i=0;i<pxEls.length;i++) pxEls[i]._px = parseFloat(pxEls[i].dataset.px)||0;
  if(PX_REDUCE){ pxEls.forEach(el=>el.style.translate=""); return; }
  applyParallax();
}
window.addEventListener("scroll", queueParallax, {passive:true});
window.addEventListener("pointermove", e=>{
  if(PX_REDUCE) return;
  pxPointerX = (e.clientX/(window.innerWidth||1))*2 - 1;
  pxPointerY = (e.clientY/(window.innerHeight||1))*2 - 1;
  queueParallax();
}, {passive:true});

<script>
"use strict";
/* ════════════ drifting black-dot particles (non-blocking, Log screen) ════════════
   A pointer-events:none canvas layer of slow-moving ink dots. Visible only on
   the Log screen, wraps at the edges, and honours prefers-reduced-motion. */
(function(){
  const cv=document.getElementById("dot-particles"); if(!cv) return;
  if(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches){ cv.style.display="none"; return; }
  const ctx=cv.getContext("2d");
  const COUNT=5, dpr=Math.min(2, window.devicePixelRatio||1);
  let W=0,H=0,dots=[],raf=0;
  function resize(){
    const r=cv.getBoundingClientRect();
    if(!r.width||!r.height) return;
    W=r.width; H=r.height;
    cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  function mk(){ return { x:Math.random()*W||Math.random()*402, y:Math.random()*H||Math.random()*700,
    r:8, a:1,
    vx:(Math.random()-0.5)*0.20, vy:(Math.random()-0.5)*0.18 - 0.05 }; }
  function init(){ dots=[]; for(let i=0;i<COUNT;i++) dots.push(mk()); }
  function step(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<dots.length;i++){
      const d=dots[i];
      d.x+=d.vx; d.y+=d.vy;
      if(d.x<-8) d.x=W+8; else if(d.x>W+8) d.x=-8;
      if(d.y<-8) d.y=H+8; else if(d.y>H+8) d.y=-8;
      ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,6.2832);
      ctx.fillStyle="rgba(35,33,28,"+d.a.toFixed(3)+")"; ctx.fill();
    }
    raf=requestAnimationFrame(step);
  }
  function start(){ if(!raf) raf=requestAnimationFrame(step); }
  function stop(){ if(raf){ cancelAnimationFrame(raf); raf=0; } if(W&&H) ctx.clearRect(0,0,W,H); }
  window.addEventListener("resize",()=>{ resize(); },{passive:true});
  cv.style.display="block";
  resize(); init(); start();
})();
</script>
