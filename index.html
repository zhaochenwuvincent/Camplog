<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Camp Log</title>
<meta name="description" content="A pocket logbook for camping trips.">
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Camp Log">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<meta name="theme-color" content="#25382C">
<style>
:root{
  --canvas:#ECEFE2;
  --card:#FBFAF1;
  --ink:#25382C;
  --ink-soft:#5F6E5F;
  --line:#C8CFB8;
  --blaze:#E25A28;
  --blaze-soft:#F4D9CC;
  --lake:#3E7C8F;
  --lake-soft:#D8E6EA;
  --done:#8A977F;
  --radius:14px;
  --pad:16px;
}
@media (prefers-color-scheme: dark){
  :root{
    --canvas:#141E17;
    --card:#1D2A20;
    --ink:#E9E6D4;
    --ink-soft:#9CAA97;
    --line:#33422F;
    --blaze:#F06A35;
    --blaze-soft:#3C2A1E;
    --lake:#6FAFC2;
    --lake-soft:#1E3238;
    --done:#5E6E59;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--canvas);
  color:var(--ink);
  min-height:100%;
  line-height:1.45;
  overscroll-behavior-y:none;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea{font:inherit;color:inherit}
.mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-variant-numeric:tabular-nums}

/* ---------- header ---------- */
header{
  position:relative;
  padding:calc(env(safe-area-inset-top) + 18px) var(--pad) 14px;
  background:var(--ink);
  color:var(--canvas);
  overflow:hidden;
}
header svg.topo{position:absolute;inset:0;width:100%;height:100%;opacity:.16;pointer-events:none}
header h1{
  font-family:ui-rounded,-apple-system,sans-serif;
  font-weight:800;
  font-size:1.7rem;
  letter-spacing:-.01em;
  position:relative;
}
header h1 .flag{display:inline-block;width:.62em;height:.42em;background:var(--blaze);border-radius:2px;margin-right:.32em;transform:translateY(-.04em)}
.statline{position:relative;margin-top:2px;font-size:.78rem;color:var(--canvas);opacity:.75}
.statline b{font-weight:700}

/* ---------- tabs / layout ---------- */
main{padding:var(--pad) var(--pad) calc(env(safe-area-inset-bottom) + 96px);max-width:640px;margin:0 auto}
.view{display:none}
.view.active{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion: reduce){
  .view.active{animation:none}
  *{transition:none !important}
}
nav.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:30;
  display:flex;justify-content:space-around;
  background:var(--card);
  border-top:1px solid var(--line);
  padding:8px 8px calc(env(safe-area-inset-bottom) + 8px);
}
nav.tabbar button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:.68rem;font-weight:600;color:var(--ink-soft);
  padding:4px 0;border-radius:10px;
}
nav.tabbar button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
nav.tabbar button.active{color:var(--blaze)}
nav.tabbar button:focus-visible{outline:2px solid var(--blaze);outline-offset:2px}

/* ---------- section heads ---------- */
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin:4px 0 12px}
.section-head h2{font-family:ui-rounded,-apple-system,sans-serif;font-weight:800;font-size:1.15rem}
.section-head .tool{font-size:.78rem;font-weight:600;color:var(--lake)}
.section-head .tool:focus-visible{outline:2px solid var(--lake);outline-offset:2px}

/* ---------- tag filter ---------- */
.tagrow{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;scrollbar-width:none}
.tagrow::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;font-size:.74rem;font-weight:600;
  padding:5px 11px;border-radius:999px;
  border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
}
.chip.on{background:var(--ink);border-color:var(--ink);color:var(--canvas)}
.chip:focus-visible{outline:2px solid var(--blaze);outline-offset:2px}

/* ---------- trail timeline ---------- */
.trail{position:relative;padding-left:34px}
.trail::before{
  content:"";position:absolute;left:13px;top:6px;bottom:6px;width:0;
  border-left:2px dashed var(--line);
}
.stop{position:relative;margin-bottom:14px}
.stop .blaze{
  position:absolute;left:-27px;top:16px;
  width:12px;height:18px;border-radius:3px;
  background:var(--blaze);
  box-shadow:0 0 0 4px var(--canvas);
}
.stop.upcoming .blaze{background:var(--card);border:2px solid var(--lake)}
.stop.now .blaze{background:var(--lake)}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:13px 14px;
  text-align:left;width:100%;
  display:block;
}
.card:focus-visible{outline:2px solid var(--blaze);outline-offset:2px}
.card .dates{font-size:.72rem;color:var(--ink-soft);letter-spacing:.04em;text-transform:uppercase}
.card .dates .nights{color:var(--blaze);font-weight:700}
.stop.upcoming .card .dates .nights{color:var(--lake)}
.card h3{font-family:ui-rounded,-apple-system,sans-serif;font-weight:800;font-size:1.02rem;margin:2px 0 1px}
.card .place{font-size:.82rem;color:var(--ink-soft)}
.card .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.card .tags span{font-size:.68rem;font-weight:600;padding:2px 8px;border-radius:999px;background:var(--blaze-soft);color:var(--blaze)}
.stop.upcoming .card .tags span{background:var(--lake-soft);color:var(--lake)}
.card .notes{font-size:.82rem;color:var(--ink-soft);margin-top:7px;white-space:pre-wrap}

.here{
  position:relative;display:flex;align-items:center;gap:10px;
  margin:18px 0 18px -34px;padding-left:5px;
}
.here .pin{
  width:18px;height:18px;flex:0 0 auto;
  background:var(--blaze);
  clip-path:polygon(50% 100%, 0 18%, 100% 18%);
  box-shadow:0 0 0 4px var(--canvas);
  margin-left:4px;
}
.here span{font-family:ui-monospace,monospace;font-size:.7rem;font-weight:700;letter-spacing:.18em;color:var(--blaze)}
.here::after{content:"";flex:1;border-top:2px solid var(--blaze);opacity:.35}

.empty{
  text-align:center;color:var(--ink-soft);font-size:.88rem;
  padding:38px 20px;border:1.5px dashed var(--line);border-radius:var(--radius);
}
.empty b{display:block;font-family:ui-rounded,-apple-system,sans-serif;font-size:1rem;color:var(--ink);margin-bottom:4px}

/* ---------- FAB ---------- */
.fab{
  position:fixed;right:18px;bottom:calc(env(safe-area-inset-bottom) + 76px);z-index:25;
  width:54px;height:54px;border-radius:18px;
  background:var(--blaze);color:#fff;
  font-size:1.9rem;font-weight:300;line-height:1;
  box-shadow:0 6px 18px rgba(0,0,0,.22);
  display:flex;align-items:center;justify-content:center;
}
.fab:focus-visible{outline:3px solid var(--ink);outline-offset:2px}

/* ---------- lists (checklist / todo) ---------- */
ul.items{list-style:none;display:flex;flex-direction:column;gap:8px}
ul.items li{
  display:flex;align-items:center;gap:11px;
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:11px 12px;
}
.tick{
  width:24px;height:24px;flex:0 0 auto;border-radius:8px;
  border:2px solid var(--line);background:transparent;
  display:flex;align-items:center;justify-content:center;
}
.tick svg{width:14px;height:14px;stroke:#fff;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0}
li.done .tick{background:var(--done);border-color:var(--done)}
li.done .tick svg{opacity:1}
li .txt{flex:1;font-size:.92rem;word-break:break-word}
li.done .txt{color:var(--done);text-decoration:line-through}
li .del{color:var(--ink-soft);font-size:1.05rem;padding:4px 6px;opacity:.6}
.tick:focus-visible,li .del:focus-visible{outline:2px solid var(--blaze);outline-offset:2px}
.addrow{display:flex;gap:8px;margin-bottom:14px}
.addrow input{
  flex:1;padding:11px 13px;border-radius:12px;
  border:1px solid var(--line);background:var(--card);
  font-size:.92rem;
}
.addrow input:focus{outline:2px solid var(--lake);outline-offset:1px}
.addrow button{
  padding:0 16px;border-radius:12px;background:var(--ink);color:var(--canvas);
  font-weight:700;font-size:.88rem;
}
.addrow button:focus-visible{outline:2px solid var(--blaze);outline-offset:2px}

/* ---------- sheet (add/edit trip) ---------- */
.sheet-backdrop{
  position:fixed;inset:0;background:rgba(15,22,16,.45);z-index:40;
  display:none;
}
.sheet-backdrop.open{display:block}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:41;
  background:var(--canvas);
  border-radius:20px 20px 0 0;
  padding:18px var(--pad) calc(env(safe-area-inset-bottom) + 18px);
  max-height:88vh;overflow-y:auto;
  transform:translateY(105%);transition:transform .22s ease;
  max-width:640px;margin:0 auto;
}
.sheet.open{transform:none}
.sheet h2{font-family:ui-rounded,-apple-system,sans-serif;font-weight:800;font-size:1.2rem;margin-bottom:14px}
.field{margin-bottom:13px}
.field label{display:block;font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px}
.field input,.field textarea{
  width:100%;padding:11px 13px;border-radius:12px;
  border:1px solid var(--line);background:var(--card);font-size:.95rem;
}
.field input:focus,.field textarea:focus{outline:2px solid var(--lake);outline-offset:1px}
.field textarea{min-height:74px;resize:vertical}
.daterow{display:flex;gap:10px}
.daterow .field{flex:1}
.tagsugg{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.sheet-actions{display:flex;gap:10px;margin-top:6px}
.btn{
  flex:1;padding:13px;border-radius:13px;font-weight:700;font-size:.95rem;text-align:center;
}
.btn.primary{background:var(--blaze);color:#fff}
.btn.ghost{background:var(--card);border:1px solid var(--line);color:var(--ink)}
.btn.danger{background:none;color:var(--blaze);font-size:.85rem;margin-top:10px;width:100%}
.btn:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

/* ---------- footer tools ---------- */
.datatools{
  margin-top:26px;display:flex;justify-content:center;gap:18px;
  font-size:.76rem;color:var(--ink-soft);
}
.datatools button{font-weight:600;text-decoration:underline;text-underline-offset:3px;color:var(--ink-soft)}
.toast{
  position:fixed;left:50%;transform:translateX(-50%) translateY(20px);
  bottom:calc(env(safe-area-inset-bottom) + 140px);z-index:60;
  background:var(--ink);color:var(--canvas);
  padding:9px 16px;border-radius:999px;font-size:.8rem;font-weight:600;
  opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <svg class="topo" viewBox="0 0 360 90" preserveAspectRatio="none" aria-hidden="true">
    <g fill="none" stroke="#ECEFE2" stroke-width="1">
      <path d="M-10 70 Q 60 30 130 55 T 290 45 T 380 60"/>
      <path d="M-10 82 Q 70 45 140 66 T 300 56 T 380 72"/>
      <path d="M-10 58 Q 50 18 120 44 T 280 32 T 380 48"/>
      <path d="M-10 46 Q 45 8 115 32 T 270 20 T 380 36"/>
    </g>
  </svg>
  <h1><span class="flag" aria-hidden="true"></span>Camp Log</h1>
  <p class="statline mono" id="statline"></p>
</header>

<main>
  <!-- TRIPS -->
  <section class="view active" id="view-trips" aria-label="Trips">
    <div class="tagrow" id="tagrow"></div>
    <div id="timeline"></div>
    <div class="datatools">
      <button id="btn-export">Export backup</button>
      <button id="btn-import">Import backup</button>
      <input type="file" id="import-file" accept="application/json,.json" hidden>
    </div>
  </section>

  <!-- CHECKLIST -->
  <section class="view" id="view-checklist" aria-label="Packing checklist">
    <div class="section-head">
      <h2>Packing checklist</h2>
      <button class="tool" id="btn-reset-checks">Uncheck all</button>
    </div>
    <div class="addrow">
      <input id="check-input" type="text" placeholder="Add gear…" enterkeyhint="done" aria-label="New checklist item">
      <button id="check-add">Add</button>
    </div>
    <ul class="items" id="checklist"></ul>
  </section>

  <!-- TODO -->
  <section class="view" id="view-todo" aria-label="To-do list">
    <div class="section-head">
      <h2>To-do</h2>
      <button class="tool" id="btn-clear-done">Clear done</button>
    </div>
    <div class="addrow">
      <input id="todo-input" type="text" placeholder="Add a task…" enterkeyhint="done" aria-label="New task">
      <button id="todo-add">Add</button>
    </div>
    <ul class="items" id="todolist"></ul>
  </section>
</main>

<button class="fab" id="fab" aria-label="Add trip">+</button>

<nav class="tabbar" aria-label="Sections">
  <button data-view="trips" class="active">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 20 L12 4 L21 20 Z M12 4 V9 M9.5 20 L12 14 L14.5 20"/></svg>
    Trips
  </button>
  <button data-view="checklist">
    <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="3" width="16" height="18" rx="3"/><path d="M8 9 l2 2 4-4 M8 15 h8"/></svg>
    Checklist
  </button>
  <button data-view="todo">
    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="7" cy="7" r="2.5"/><path d="M12 7 h8 M12 17 h8"/><circle cx="7" cy="17" r="2.5"/></svg>
    To-do
  </button>
</nav>

<!-- add / edit trip sheet -->
<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
  <h2 id="sheet-title">New trip</h2>
  <div class="field">
    <label for="f-title">Trip name</label>
    <input id="f-title" type="text" placeholder="e.g. Lakeside long weekend">
  </div>
  <div class="field">
    <label for="f-place">Place</label>
    <input id="f-place" type="text" placeholder="e.g. Lake Sagami">
  </div>
  <div class="daterow">
    <div class="field">
      <label for="f-start">Start</label>
      <input id="f-start" type="date">
    </div>
    <div class="field">
      <label for="f-end">End</label>
      <input id="f-end" type="date">
    </div>
  </div>
  <div class="field">
    <label for="f-tags">Tags <span style="text-transform:none;font-weight:400">(comma separated)</span></label>
    <input id="f-tags" type="text" placeholder="lake, with family, autumn">
    <div class="tagsugg" id="tagsugg"></div>
  </div>
  <div class="field">
    <label for="f-notes">Notes</label>
    <textarea id="f-notes" placeholder="Campsite number, weather, what to remember next time…"></textarea>
  </div>
  <div class="sheet-actions">
    <button class="btn ghost" id="btn-cancel">Cancel</button>
    <button class="btn primary" id="btn-save">Save trip</button>
  </div>
  <button class="btn danger" id="btn-delete" hidden>Delete this trip</button>
</div>

<div class="toast" id="toast" role="status"></div>

<script>
"use strict";
const KEY = "camplog.v1";
const $ = (s) => document.querySelector(s);

/* ---------- state ---------- */
const DEFAULT_CHECKLIST = ["Tent + stakes","Sleeping bags","Sleeping pads","Stove + fuel","Lighter / matches","Cookware + utensils","Water","Headlamps","First aid kit","Trash bags","Power bank","Rain layer"];
let state = load();
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {
    trips: [],
    checklist: DEFAULT_CHECKLIST.map(t => ({id:uid(), text:t, done:false})),
    todos: []
  };
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/* ---------- helpers ---------- */
function todayStr(){
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function fmtRange(start, end){
  const f = (s, withYear) => {
    const d = new Date(s + "T00:00");
    const opts = {month:"short", day:"numeric"};
    if(withYear) opts.year = "2-digit";
    return new Intl.DateTimeFormat("en", opts).format(d);
  };
  if(!end || end === start) return f(start, true);
  const sameMonth = start.slice(0,7) === end.slice(0,7);
  if(sameMonth){
    return f(start, false) + "–" + new Date(end+"T00:00").getDate() + " ’" + start.slice(2,4);
  }
  return f(start, false) + " – " + f(end, true);
}
function nights(start, end){
  if(!end) return 0;
  return Math.max(0, Math.round((new Date(end+"T00:00") - new Date(start+"T00:00")) / 86400000));
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function toast(msg){
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._h);
  t._h = setTimeout(()=> t.classList.remove("show"), 1800);
}

/* ---------- tabs ---------- */
document.querySelectorAll("nav.tabbar button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("nav.tabbar button").forEach(b => b.classList.toggle("active", b === btn));
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    $("#view-" + btn.dataset.view).classList.add("active");
    $("#fab").style.display = btn.dataset.view === "trips" ? "flex" : "none";
    window.scrollTo({top:0});
  });
});

/* ---------- trips ---------- */
let activeTag = null;

function allTags(){
  const set = new Set();
  state.trips.forEach(t => (t.tags||[]).forEach(g => set.add(g)));
  return [...set].sort((a,b)=> a.localeCompare(b));
}

function renderTagRow(){
  const tags = allTags();
  const row = $("#tagrow");
  if(!tags.length){ row.innerHTML = ""; return; }
  row.innerHTML = `<button class="chip ${activeTag===null?"on":""}" data-tag="">All</button>` +
    tags.map(g => `<button class="chip ${activeTag===g?"on":""}" data-tag="${escapeHtml(g)}">${escapeHtml(g)}</button>`).join("");
  row.querySelectorAll(".chip").forEach(c => c.addEventListener("click", () => {
    activeTag = c.dataset.tag || null;
    renderTrips();
  }));
}

function tripCard(t, cls){
  const n = nights(t.start, t.end);
  return `<div class="stop ${cls}">
    <span class="blaze" aria-hidden="true"></span>
    <button class="card" data-id="${t.id}" aria-label="Edit trip ${escapeHtml(t.title)}">
      <div class="dates mono">${fmtRange(t.start, t.end)}${n ? ` · <span class="nights">${n} night${n>1?"s":""}</span>` : ""}</div>
      <h3>${escapeHtml(t.title)}</h3>
      ${t.place ? `<div class="place">${escapeHtml(t.place)}</div>` : ""}
      ${(t.tags && t.tags.length) ? `<div class="tags">${t.tags.map(g=>`<span>${escapeHtml(g)}</span>`).join("")}</div>` : ""}
      ${t.notes ? `<div class="notes">${escapeHtml(t.notes)}</div>` : ""}
    </button>
  </div>`;
}

function renderTrips(){
  renderTagRow();
  const tl = $("#timeline");
  const today = todayStr();
  let trips = [...state.trips];
  if(activeTag) trips = trips.filter(t => (t.tags||[]).includes(activeTag));

  if(!trips.length){
    tl.innerHTML = `<div class="empty"><b>${state.trips.length ? "No trips with this tag" : "No trips yet"}</b>${state.trips.length ? "Pick another tag, or All." : "Tap + to log your first one — past or planned."}</div>`;
    renderStats();
    return;
  }

  const upcoming = trips.filter(t => t.start > today).sort((a,b)=> b.start.localeCompare(a.start));
  const current  = trips.filter(t => t.start <= today && (t.end || t.start) >= today).sort((a,b)=> b.start.localeCompare(a.start));
  const past     = trips.filter(t => (t.end || t.start) < today).sort((a,b)=> b.start.localeCompare(a.start));

  let html = `<div class="trail">`;
  html += upcoming.map(t => tripCard(t, "upcoming")).join("");
  html += `<div class="here"><span class="pin" aria-hidden="true"></span><span>YOU ARE HERE</span></div>`;
  html += current.map(t => tripCard(t, "now")).join("");
  html += past.map(t => tripCard(t, "past")).join("");
  html += `</div>`;
  tl.innerHTML = html;

  tl.querySelectorAll(".card").forEach(c => c.addEventListener("click", () => openSheet(c.dataset.id)));
  renderStats();
}

function renderStats(){
  const today = todayStr();
  const past = state.trips.filter(t => (t.end || t.start) <= today);
  const up = state.trips.filter(t => t.start > today).length;
  const totalNights = past.reduce((s,t)=> s + nights(t.start, t.end), 0);
  const places = new Set(state.trips.map(t => t.place).filter(Boolean)).size;
  $("#statline").innerHTML = `<b>${past.length}</b> trips · <b>${totalNights}</b> nights out · <b>${places}</b> places · <b>${up}</b> upcoming`;
}

/* ---------- trip sheet ---------- */
let editingId = null;

function openSheet(id){
  editingId = id || null;
  const t = id ? state.trips.find(x => x.id === id) : null;
  $("#sheet-title").textContent = t ? "Edit trip" : "New trip";
  $("#f-title").value = t ? t.title : "";
  $("#f-place").value = t ? (t.place || "") : "";
  $("#f-start").value = t ? t.start : todayStr();
  $("#f-end").value = t ? (t.end || "") : "";
  $("#f-tags").value = t ? (t.tags || []).join(", ") : "";
  $("#f-notes").value = t ? (t.notes || "") : "";
  $("#btn-delete").hidden = !t;
  renderTagSuggestions();
  $("#backdrop").classList.add("open");
  $("#sheet").classList.add("open");
}
function closeSheet(){
  $("#backdrop").classList.remove("open");
  $("#sheet").classList.remove("open");
  editingId = null;
}
function renderTagSuggestions(){
  const box = $("#tagsugg");
  const tags = allTags();
  box.innerHTML = tags.map(g => `<button class="chip" type="button" data-g="${escapeHtml(g)}">${escapeHtml(g)}</button>`).join("");
  box.querySelectorAll("button").forEach(b => b.addEventListener("click", () => {
    const inp = $("#f-tags");
    const cur = inp.value.split(",").map(s=>s.trim()).filter(Boolean);
    if(!cur.includes(b.dataset.g)) cur.push(b.dataset.g);
    inp.value = cur.join(", ");
  }));
}

$("#fab").addEventListener("click", () => openSheet(null));
$("#backdrop").addEventListener("click", closeSheet);
$("#btn-cancel").addEventListener("click", closeSheet);

$("#btn-save").addEventListener("click", () => {
  const title = $("#f-title").value.trim();
  const start = $("#f-start").value;
  if(!title){ toast("Give the trip a name"); $("#f-title").focus(); return; }
  if(!start){ toast("Pick a start date"); $("#f-start").focus(); return; }
  let end = $("#f-end").value;
  if(end && end < start){ const tmp = end; end = start; /* swap */ $("#f-start").value = tmp; }
  const trip = {
    id: editingId || uid(),
    title,
    place: $("#f-place").value.trim(),
    start: $("#f-start").value,
    end: end || "",
    tags: $("#f-tags").value.split(",").map(s=>s.trim()).filter(Boolean),
    notes: $("#f-notes").value.trim()
  };
  const wasEditing = !!editingId;
  if(wasEditing){
    const i = state.trips.findIndex(t => t.id === editingId);
    state.trips[i] = trip;
  }else{
    state.trips.push(trip);
  }
  save(); closeSheet(); renderTrips();
  toast(wasEditing ? "Trip updated" : "Trip logged");
});

$("#btn-delete").addEventListener("click", () => {
  if(!editingId) return;
  if(!confirm("Delete this trip? This can't be undone.")) return;
  state.trips = state.trips.filter(t => t.id !== editingId);
  if(activeTag && !allTags().includes(activeTag)) activeTag = null;
  save(); closeSheet(); renderTrips();
  toast("Trip deleted");
});

/* ---------- generic list rendering ---------- */
function renderList(listKey, ulSel){
  const ul = $(ulSel);
  const items = state[listKey];
  if(!items.length){
    ul.innerHTML = `<div class="empty"><b>Nothing here yet</b>Add your first item above.</div>`;
    return;
  }
  ul.innerHTML = items.map(it => `
    <li class="${it.done ? "done" : ""}" data-id="${it.id}">
      <button class="tick" role="checkbox" aria-checked="${it.done}" aria-label="${escapeHtml(it.text)}">
        <svg viewBox="0 0 24 24"><path d="M5 13 l5 5 9-11"/></svg>
      </button>
      <span class="txt">${escapeHtml(it.text)}</span>
      <button class="del" aria-label="Remove ${escapeHtml(it.text)}">✕</button>
    </li>`).join("");
  ul.querySelectorAll("li").forEach(li => {
    const id = li.dataset.id;
    li.querySelector(".tick").addEventListener("click", () => {
      const it = state[listKey].find(x => x.id === id);
      it.done = !it.done;
      save(); renderList(listKey, ulSel);
    });
    li.querySelector(".del").addEventListener("click", () => {
      state[listKey] = state[listKey].filter(x => x.id !== id);
      save(); renderList(listKey, ulSel);
    });
  });
}
function addItem(listKey, inputSel, ulSel){
  const inp = $(inputSel);
  const text = inp.value.trim();
  if(!text) return;
  state[listKey].push({id:uid(), text, done:false});
  inp.value = "";
  save(); renderList(listKey, ulSel);
  inp.focus();
}

$("#check-add").addEventListener("click", () => addItem("checklist","#check-input","#checklist"));
$("#check-input").addEventListener("keydown", e => { if(e.key === "Enter") addItem("checklist","#check-input","#checklist"); });
$("#btn-reset-checks").addEventListener("click", () => {
  state.checklist.forEach(it => it.done = false);
  save(); renderList("checklist","#checklist");
  toast("Checklist reset");
});

$("#todo-add").addEventListener("click", () => addItem("todos","#todo-input","#todolist"));
$("#todo-input").addEventListener("keydown", e => { if(e.key === "Enter") addItem("todos","#todo-input","#todolist"); });
$("#btn-clear-done").addEventListener("click", () => {
  state.todos = state.todos.filter(it => !it.done);
  save(); renderList("todos","#todolist");
});

/* ---------- backup ---------- */
$("#btn-export").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "camplog-backup-" + todayStr() + ".json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=> URL.revokeObjectURL(a.href), 4000);
});
$("#btn-import").addEventListener("click", () => $("#import-file").click());
$("#import-file").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const data = JSON.parse(r.result);
      if(!data || !Array.isArray(data.trips)) throw new Error("bad");
      state = {
        trips: data.trips,
        checklist: Array.isArray(data.checklist) ? data.checklist : state.checklist,
        todos: Array.isArray(data.todos) ? data.todos : state.todos
      };
      save(); renderTrips(); renderList("checklist","#checklist"); renderList("todos","#todolist");
      toast("Backup restored");
    }catch(err){
      toast("That file isn't a Camp Log backup");
    }
  };
  r.readAsText(file);
  e.target.value = "";
});

/* ---------- init ---------- */
renderTrips();
renderList("checklist","#checklist");
renderList("todos","#todolist");

if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
